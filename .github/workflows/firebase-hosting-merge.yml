name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Fixed the 'pm' typo to 'npm' and added the frontend prefix
      - run: npm --prefix frontend install && npm --prefix frontend run build
      
      # Fixed the indentation of 'with' (it must align with 'uses')
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DIGITAL_ASSET_TRACKER_C7F2F }}'
          channelId: live
          projectId: digital-asset-tracker-c7f2f
